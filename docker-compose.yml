version: '3.8'

services:
  # Backend - Me4BrAIn LLM Engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jai-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/config:/app/config
      - ./backend/data:/app/data
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j
    networks:
      - jai-network
    command: >
      sh -c "python -m me4brain.api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - PersAn React App
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: jai-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:8000
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend/frontend/src:/app/frontend/src
      - ./frontend/packages:/app/packages
    depends_on:
      - backend
    networks:
      - jai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jai-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-jai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jai_password}
      POSTGRES_DB: ${DB_NAME:-me4brain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - jai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j Graph Database (for semantic memory)
  neo4j:
    image: neo4j:5-community
    container_name: jai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - jai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - for production)
  # nginx:
  #   image: nginx:latest
  #   container_name: jai-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - jai-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:

networks:
  jai-network:
    driver: bridge
