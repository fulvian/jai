# =============================================================================
# Kubernetes Secrets for JAI
# =============================================================================
# IMPORTANT: In production, use external secrets management (AWS Secrets Manager,
# HashiCorp Vault, etc.) and SOPS for encryption. This file is a template.
# =============================================================================
# Usage:
#   # Create secrets manually (DO NOT commit real values)
#   kubectl create secret generic me4brain-secrets \
#     --from-literal=DB_PASSWORD='your-db-password' \
#     --from-literal=ENCRYPTION_KEY='your-encryption-key' \
#     --from-literal=SECRET_KEY='your-secret-key' \
#     -n jai-staging
#
#   # Or use sealed-secrets for GitOps
#   kubeseal --cert pub-cert.pem -n jai-staging < secrets.yaml > sealed-secrets.yaml
# =============================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: me4brain-secrets
  namespace: jai-staging
type: Opaque
stringData:
  # Database credentials
  DB_USER: "jai_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DB_NAME: "me4brain"
  
  # Encryption key (32 bytes, base64 encoded for Fernet)
  ENCRYPTION_KEY: "CHANGE_ME_USE_SECURE_KEY_GENERATION"
  
  # Django/FastAPI secret key
  SECRET_KEY: "CHANGE_ME_USE_SECURE_SECRET_GENERATION"
  
  # Redis password (if using auth)
  REDIS_PASSWORD: ""
  
  # API keys (LLM providers)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # JWT secret
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"

---
apiVersion: v1
kind: Secret
metadata:
  name: me4brain-secrets
  namespace: jai-production
type: Opaque
stringData:
  # Database credentials
  DB_USER: "jai_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"  # Use AWS Secrets Manager
  DB_NAME: "me4brain"
  
  # Encryption key (32 bytes, base64 encoded for Fernet)
  ENCRYPTION_KEY: "CHANGE_ME_USE_SECURE_KEY_GENERATION"  # Use AWS Secrets Manager
  
  # Django/FastAPI secret key
  SECRET_KEY: "CHANGE_ME_USE_SECURE_SECRET_GENERATION"  # Use AWS Secrets Manager
  
  # Redis password (if using auth)
  REDIS_PASSWORD: ""
  
  # API keys (LLM providers)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # JWT secret
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"  # Use AWS Secrets Manager

# =============================================================================
# TLS Certificates (use cert-manager for automatic renewal)
# =============================================================================
# For production, use Let's Encrypt with cert-manager:
#
# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: me4brain-tls
#   namespace: jai-production
# spec:
#   secretName: me4brain-tls
#   issuerRef:
#     name: letsencrypt-prod
#     kind: ClusterIssuer
#   dnsNames:
#     - jai.example.com
#     - "*.jai.example.com"
# =============================================================================
