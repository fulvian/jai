# Tool Hierarchy Configuration
# Maps each tool to: domain > category > skill
# Used by ToolIndexManager for enhanced retrieval filtering

# =============================================================================
# GOOGLE WORKSPACE (59 tools)
# =============================================================================
google_workspace:
  gmail:
    search: [gmail_search]
    get: [gmail_get_message, gmail_get_attachments]
    send: [gmail_send, gmail_reply, gmail_forward]
  drive:
    search: [drive_search, drive_list]
    get: [drive_get_file, drive_get_content]
    manage: [drive_create_folder, drive_copy_file, drive_export]
  calendar:
    list: [calendar_list_events, calendar_upcoming]
    search: [calendar_search]
    manage: [calendar_create_event]
  docs:
    manage: [google_docs_create, google_docs_read, google_docs_append]
  sheets:
    read: [sheets_read]
    write: [sheets_write, sheets_create]
  meet:
    manage: [meet_create, meet_list, meet_get_recording]
  forms:
    manage: [forms_create, forms_get_responses]

