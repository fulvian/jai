# =============================================================================
# Me4BrAIn Core - Docker Compose (Universal: macOS + Linux)
# =============================================================================
# Profiles:
#   - (default): Solo infrastruttura (dev locale)
#   - app: Infrastruttura + API containerizzata
#   - full: Stack completo + Keycloak
#   - monitoring: + Prometheus/Grafana
# =============================================================================
name: me4brain

services:
  # ===========================================================================
  # APPLICATION
  # ===========================================================================
  me4brain:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: me4brain-api
    restart: unless-stopped
    profiles: ["app", "full"]
    env_file:
      - ../.env
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6334
      - QDRANT_HOST=qdrant
      - QDRANT_HTTP_PORT=6334
      - QDRANT_GRPC_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_HOST=neo4j
      - NEO4J_BOLT_PORT=7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      - POSTGRES_URL=postgresql://me4brain:${DB_PASSWORD:-me4brain_secret}@postgres:5432/me4brain
      - POSTGRES_HOST=postgres
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - HF_HOME=/home/appuser/.cache/huggingface
      - TRANSFORMERS_CACHE=/home/appuser/.cache/huggingface
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface
      - ../models:/app/models # Permesso RW per download automatico modelli se mancanti
      - ../data:/app/data # Google OAuth tokens (writable for refresh)
      - ~/.me4brain/skills:/home/appuser/.me4brain/skills:ro # ClawHub skills
      # === HOT RELOAD (Development) ===
      - ../src:/app/src # Source code hot reload
      - ../config:/app/config # Config hot reload (prompt hints, etc.)
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s # Increased for first-time model download
    deploy:
      resources:
        limits:
          memory: 3G # Increased for BGE-M3 embedding model (~800MB)
          cpus: "2.0"
        reservations:
          memory: 1G
    networks:
      - me4brain-network

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL - LangGraph State Persistence
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: me4brain-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5489}:5432"
    environment:
      POSTGRES_USER: me4brain
      POSTGRES_PASSWORD: ${DB_PASSWORD:-me4brain_secret}
      POSTGRES_DB: me4brain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U me4brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - me4brain-network

  # ---------------------------------------------------------------------------
  # Redis - Working Memory / Cache / Queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: me4brain-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6389}:6379"
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - me4brain-network

  # ---------------------------------------------------------------------------
  # Qdrant - Vector Database (Episodic + Procedural Memory)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: me4brain-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_GRPC_PORT:-6333}:6333"
      - "${QDRANT_HTTP_PORT:-6334}:6334"
    environment:
      QDRANT__STORAGE__MMAP_THRESHOLD_KB: 2048
      QDRANT__SERVICE__GRPC_PORT: 6333
      QDRANT__SERVICE__HTTP_PORT: 6334
      # Ottimizzazione memory
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "grep -q 18BE /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - me4brain-network

  # ---------------------------------------------------------------------------
  # Neo4j - Graph Database (Semantic Memory)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: me4brain-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7478}:7474"
      - "${NEO4J_BOLT_PORT:-7697}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
      # RAM Limits ottimizzati per 16GB
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # Transaction & Query Config (Session Graph resilience)
      NEO4J_db_transaction_timeout: 30s
      NEO4J_db_transaction_bookmark__ready__timeout: 30s
      NEO4J_server_db_query__cache__size: 1000
      NEO4J_db_logs_query_enabled: INFO
      NEO4J_db_logs_query_threshold: 1s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - me4brain-network

  # ---------------------------------------------------------------------------
  # Keycloak - Authentication & Authorization (Optional)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: me4brain-keycloak
    restart: unless-stopped
    profiles: ["auth", "full"]
    ports:
      - "${KEYCLOAK_PORT:-8489}:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-admin_secret}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms128m -Xmx256m"
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - me4brain-network

  # ===========================================================================
  # MONITORING (Optional)
  # ===========================================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: me4brain-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - me4brain-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: me4brain-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - me4brain-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  keycloak_data:
  prometheus_data:
  grafana_data:
  hf_cache: # HuggingFace cache for BGE-M3 embedding model

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  me4brain-network:
    driver: bridge
