# docker-compose.dev.yml
# Development override - volume mounts + hot-reload
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up me4brain
#
# Or run Python locally with Docker infra only:
#   docker compose up -d postgres redis qdrant neo4j
#   uv run uvicorn me4brain.api.main:app --reload

services:
  me4brain:
    # Use same build context as production but override for dev
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: me4brain-api
    volumes:
      # Mount source code for hot-reload (changes reflect instantly)
      - ../src:/app/src:delegated
      # Mount models directory
      - ../models:/app/models:ro
      # Mount data directory (OAuth tokens, etc.)
      - ../data:/app/data
      # Dev cache (separate from prod)
      - hf_cache_dev:/home/appuser/.cache/huggingface
    command: >
      uvicorn me4brain.api.main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload 
      --reload-dir /app/src
      --loop asyncio
      --log-level debug
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      # Override connection strings for Docker network
      - QDRANT_HOST=qdrant
      - QDRANT_HTTP_PORT=6334
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_HOST=neo4j
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      - POSTGRES_URL=postgresql://me4brain:${DB_PASSWORD:-me4brain_secret}@postgres:5432/me4brain
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - me4brain-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Faster healthcheck for dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # No resource limits in dev for flexibility
    deploy:
      resources: {}

volumes:
  hf_cache_dev:
    name: me4brain_hf_cache_dev
